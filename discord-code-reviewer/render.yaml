services:
  - type: worker
    name: discord-ai-code-reviewer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
